apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: breathe-safe-ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/breathe-safe-ai.git
    targetRevision: main
    path: infrastructure/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: breathe-safe-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
